<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

html{
scroll-behavior:smooth;
}

body{
background:#111;
color:white;
overflow-x:hidden;
}

/* Loading */
.loader{
position:fixed;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
font-size:30px;
z-index:9999;
transition:1s;
}

/* Navbar */
nav{
position:fixed;
width:100%;
padding:20px 8%;
display:flex;
justify-content:space-between;
align-items:center;
z-index:1000;
transition:.4s;
}

nav.active{
background:rgba(0,0,0,.7);
backdrop-filter:blur(10px);
}

.logo{
font-size:28px;
font-weight:bold;
}

nav ul{
display:flex;
gap:30px;
list-style:none;
}

nav a{
text-decoration:none;
color:white;
}

/* Hero */
.hero{
height:100vh;
background:url("https://4.bp.blogspot.com/-U7oGqCDYYXY/WUEA13jN6tI/AAAAAAAAAb8/EFGuWNP_L8g3iAiCH34WhtbXb60toRZ8ACLcBGAs/s1600/Raja%2BAmpat.png") center/cover;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
}

.hero h1{
font-size:70px;
}

.hero p{
margin:20px 0;
font-size:20px;
}

.btn{
background:#ffc107;
padding:15px 40px;
border-radius:50px;
color:black;
text-decoration:none;
transition:.4s;
}

.btn:hover{
transform:translateY(-8px);
box-shadow:0 10px 30px gold;
}

/* Section */
section{
padding:100px 8%;
}

h2{
text-align:center;
font-size:40px;
margin-bottom:50px;
}

/* Gallery */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
}

.grid img{
width:100%;
border-radius:20px;
cursor:pointer;
transition:.5s;
}

.grid img:hover{
transform:scale(1.05);
}

/* Stats */
.stats{
display:flex;
justify-content:center;
gap:80px;
flex-wrap:wrap;
text-align:center;
}

.number{
font-size:50px;
color:#ffc107;
}

/* Footer */
footer{
background:black;
padding:40px;
text-align:center;
}

/* WhatsApp */
.whatsapp{
position:fixed;
bottom:30px;
right:30px;
width:60px;
height:60px;
background:#25D366;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
font-size:30px;
text-decoration:none;
color:white;
box-shadow:0 0 20px rgba(0,255,0,.6);
}

/* Lightbox */
.lightbox{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.9);
display:none;
justify-content:center;
align-items:center;
z-index:999;
}

.lightbox img{
max-width:90%;
max-height:90%;
border-radius:20px;
}

@media(max-width:768px){

.hero h1{
font-size:45px;
}

nav ul{
display:none;
}

}

</style>

<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

<script>

AOS.init();

window.onload=function(){
document.querySelector(".loader").style.opacity="0";
setTimeout(()=>{
document.querySelector(".loader").style.display="none";
},1000);
}

window.addEventListener("scroll",()=>{
if(window.scrollY>50){
navbar.classList.add("active");
}
else{
navbar.classList.remove("active");
}
});

let images=document.querySelectorAll(".grid img");
let lightbox=document.querySelector(".lightbox");
let imgBox=document.querySelector(".lightbox img");

images.forEach(img=>{
img.onclick=()=>{
lightbox.style.display="flex";
imgBox.src=img.src;
}
});

lightbox.onclick=()=>{
    lightbox.classList.add("closing");

    setTimeout(()=>{
        lightbox.style.display="none";
        lightbox.classList.remove("closing");
    },400);
}

</script>
