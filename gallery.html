<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery | Rai.photograph_</title>
<link rel="icon" type="image/jpg" href="https://c8.alamy.com/comp/2A682HN/slr-camera-photography-logo-icon-vector-design-2A682HN.jpg">

<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:Segoe UI,sans-serif; }

body {
    background:#0f0f0f;
    color:white;
    padding:40px;
}

/* ==================== HEADER TITLE ==================== */
.header {
    text-align: center;
    margin-bottom: 60px;
}

h1 {
    font-family: 'Georgia', serif;
    font-size: 68px;
    font-weight: 400;
    letter-spacing: 2px;
    margin-bottom: 12px;
    color: white;
    text-shadow: 0 0 20px rgba(255, 193, 7, 0.3);
}

p {
    font-family: 'Segoe UI', sans-serif;
    font-size: 18px;
    color: #bbbbbb;
    max-width: 600px;
    margin: 0 auto;
    line-height: 1.6;
}

/* ==================== GALLERY ==================== */
.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 16px;
    width: 100%;
    max-width: 1400px;
    margin: 0 auto;
}

.gallery img {
    width: 100%;
    height: 100%;
    min-height: 280px;
    border-radius: 20px;
    cursor: pointer;
    object-fit: cover;
    aspect-ratio: 4 / 3;
    transition: all 0.7s cubic-bezier(0.25, 0.1, 0.25, 1);
    opacity: 0;
    transform: translateY(50px);
}

.gallery img.show {
    opacity: 1;
    transform: translateY(0);
}

.gallery img.hidden {
    display: none !important;
}

.gallery img:hover {
    transform: scale(1.03);
    filter: brightness(1.1);
}

/* Tombol */
.toggle-btn {
    display: block;
    margin: 50px auto 0;
    background-color: #ffc107;
    color: black;
    font-weight: bold;
    border: none;
    padding: 14px 40px;
    border-radius: 50px;
    cursor: pointer;
    font-size: 18px;
    box-shadow: 0 0 20px rgba(255, 193, 7, 0.6);
    animation: pulseYellow 2s infinite;
}

.toggle-btn:hover {
    background-color: #ffeb3b;
    transform: translateY(-4px) scale(1.08);
    box-shadow: 0 0 40px rgba(255, 193, 7, 0.9);
}

@keyframes pulseYellow {
    0%, 100% { box-shadow: 0 0 15px rgba(255, 193, 7, 0.6); }
    50% { box-shadow: 0 0 35px rgba(255, 193, 7, 0.9); }
}

/* Lightbox */
.lightbox {
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:rgba(0,0,0,0.95);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:999;
    opacity:0;
    transition: opacity 0.4s ease;
}

.lightbox.active {
    display:flex;
    opacity:1;
}

.lightbox img {
    max-width:90%;
    max-height:90vh;
    border-radius:20px;
    box-shadow:0 0 50px rgba(255,255,255,0.4);
}

.lightbox.active img {
    animation: zoomOpen 0.5s cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
}

.lightbox.closing img {
    animation: zoomClose 0.45s cubic-bezier(0.25, 0.1, 0.25, 1) forwards !important;
}

@keyframes zoomOpen {
    from { opacity: 0; transform: scale(0.5) translateY(50px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
}

@keyframes zoomClose {
    from { opacity: 1; transform: scale(1) translateY(0); }
    to   { opacity: 0; transform: scale(0.6) translateY(70px); }
}

/* Responsive */
@media(max-width:900px) {
    .gallery { grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); }
    h1 { font-size: 52px; }
}
@media(max-width:600px) {
    .gallery { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); }
    h1 { font-size: 42px; }
}
</style>
</head>
<body>

    <div class="header">
        <h1>Our Gallery</h1>
        <p>Capture memories and beautiful moments.</p>
    </div>

    <div class="gallery" id="gallery">
        <img src="alam.jpg" alt="Alam">
        <img src="alam 2.jpg" alt="Alam 2">
        <img src="alam 5.jpg" alt="Alam 5">
        <img src="aku dan bunga.jpg" alt="Aku dan Bunga">
        <img src="HANS.jpg" alt="Hans">
        <img src="kaca.jpg" alt="Kaca">
        <img src="alam 4.jpg" alt="Alam 4">
        <img src="1.jpg" alt="1">
        <img src="2.jpg" alt="2">
        <img src="3.jpg" alt="3">
        <img src="4.jpg" alt="4">
    </div>

    <button class="toggle-btn" id="toggleBtn">See More</button>

    <div class="lightbox" id="lightbox">
        <img src="" id="preview" alt="Preview">
    </div>

<script>
// Lightbox & See More / See Less script tetap sama seperti sebelumnya
const lightbox = document.getElementById('lightbox');
const preview = document.getElementById('preview');

document.querySelectorAll('.gallery img').forEach(img => {
    img.addEventListener('click', function() {
        preview.src = this.src;
        lightbox.classList.add('active');
    });
});

lightbox.addEventListener('click', function(e) {
    if (e.target === lightbox) {
        lightbox.classList.add('closing');
        setTimeout(() => {
            lightbox.classList.remove('active');
            lightbox.classList.remove('closing');
        }, 450);
    }
});

const gallery = document.getElementById('gallery');
const toggleBtn = document.getElementById('toggleBtn');
const initialShow = 4;

function initGallery() {
    const images = gallery.querySelectorAll('img');
    images.forEach((img, index) => {
        if (index < initialShow) {
            setTimeout(() => img.classList.add('show'), 100 + index * 120);
        } else {
            img.classList.add('hidden');
        }
    });
}

toggleBtn.addEventListener('click', function() {
    const hiddenImages = gallery.querySelectorAll('img.hidden');

    if (hiddenImages.length > 0) {
        toggleBtn.textContent = "See Less";
        toggleBtn.style.pointerEvents = "none";

        hiddenImages.forEach((img, i) => {
            img.classList.remove('hidden');
            setTimeout(() => img.classList.add('show'), 10 + i * 130);
        });

        setTimeout(() => toggleBtn.style.pointerEvents = "auto", hiddenImages.length * 130 + 500);
    } else {
        toggleBtn.textContent = "See More";
        toggleBtn.style.pointerEvents = "none";

        const images = Array.from(gallery.querySelectorAll('img')).reverse();

        images.forEach((img, i) => {
            if (i < images.length - initialShow) {
                setTimeout(() => {
                    img.classList.remove('show');
                    setTimeout(() => img.classList.add('hidden'), 700);
                }, i * 90);
            }
        });

        setTimeout(() => {
            toggleBtn.style.pointerEvents = "auto";
            gallery.scrollIntoView({ behavior: "smooth" });
        }, 1100);
    }
});

initGallery();
</script>

</body>
</html>
